apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-events-config
  namespace: logging
data:
  metricbeat.yml: |
    metricbeat.modules:
    - module: kubernetes
      period: 30s
      metricsets:
        - event
      in_cluster: true
      add_metadata: true

    output.elasticsearch:
      hosts: ["http://elasticsearch-svc.logging.svc.cluster.local:9200"]
      username: "${ELASTIC_USER}"
      password: "${ELASTIC_PASSWORD}"
      index: "metricbeat-%{+YYYY.MM.dd}"

    setup.template.enabled: false
    setup.ilm.enabled: false
    logging.level: info
    logging.to_stderr: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat-events
  namespace: logging
  labels:
    app: metricbeat-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat-events
  template:
    metadata:
      labels:
        app: metricbeat-events
    spec:
      serviceAccountName: metricbeat
      containers:
      - name: metricbeat-events
        image: docker.elastic.co/beats/metricbeat:8.12.2
        args: ["-c", "/etc/metricbeat.yml", "-e"]
        env:
        - name: ELASTIC_USER
          valueFrom:
            secretKeyRef:
              name: elastic-credentials
              key: ELASTIC_USERNAME
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: elastic-credentials
              key: ELASTIC_PASSWORD
        volumeMounts:
        - name: config
          mountPath: /etc/metricbeat.yml
          subPath: metricbeat.yml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: metricbeat-events-config
          defaultMode: 0640
